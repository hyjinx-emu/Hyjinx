version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "infra"
    commit-message:
      prefix: "ci"

  - package-ecosystem: nuget
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "infra"
    commit-message:
      prefix: nuget
    groups:
      Avalonia:
        patterns:
          - "*Avalonia*"
      Microsoft:
        patterns:
          - "Microsoft*"
      Silk.NET:
        patterns:
          - "Silk.NET*"
      OpenTK:
        patterns:
          - "OpenTK*"
      NUnit:
        patterns:
          - "NUnit*"
